<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="node_modules/@fontsource/inter/400.css">
    <link rel="stylesheet" href="node_modules/@fontsource/inter/700.css">
    <link rel="stylesheet" href="node_modules/@fontsource/inter/400-italic.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <title>Stream check</title>
</head>
<body id="restreamer-check">
    <div>
        <input type="url" name="stream-url" id="stream-url" placeholder="Stream URL">
        <a href="#">Check</a>
    </div>
    <h1></h1>
    <p></p>
    <script>
        document.querySelector("a").addEventListener("click", async () => {
            const playlist = await fetch(`https://cors.kawiesh.top/${document.querySelector("input").value}`)
                .then(response => response.text());

            if (playlist.includes(".m3u8?session=")) {
                document.querySelector("h1").innerText = "❌ This stream is not compliant with the project guidelines.";
                document.querySelector("p").innerText = "Please do not submit it.";
            } else {
                document.querySelector("h1").innerText = "This stream appears to be compliant.";
                document.querySelector("p").innerHTML = "This doesn't mean it <i>surely</i> is, but, <b>if you've checked that it complies with the other guidelines</b>, you should still submit it.";
            };
        });
    </script>
</body>
</html>
